name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit

      - name: Validate environment variables
        run: npm run validate-env
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || '' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || '' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || '' }}
          PUBLICDATA_SERVICE_KEY_ENC: ${{ secrets.PUBLICDATA_SERVICE_KEY_ENC || '' }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://bojo24.vercel.app' }}
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          # 빌드 시 필요한 최소 환경 변수 (실제 값은 사용하지 않음)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'placeholder' }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL || '' }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN || '' }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://bojo24.vercel.app' }}

  # IndexNow 핑 — main 브랜치 배포 완료 후 Bing/Naver에 URL 변경 신고
  indexnow-ping:
    name: IndexNow Ping (Bing + Naver)
    runs-on: ubuntu-latest
    needs: lint-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Wait for Vercel deployment (60s)
        run: sleep 60

      - name: Ping IndexNow API
        run: |
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.INDEXNOW_PING_SECRET }}" \
            "${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://www.bojo24.kr' }}/api/indexnow" \
            -d '{"urls":["https://www.bojo24.kr/","https://www.bojo24.kr/benefit","https://www.bojo24.kr/startup","https://www.bojo24.kr/blog"]}' \
            || echo "IndexNow ping failed (non-fatal)"

