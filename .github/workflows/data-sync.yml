name: Data Sync (Scheduled)

on:
  schedule:
    # 매일 한국 시간 오전 2시 (UTC 17:00 전날)
    - cron: '0 17 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  fetch-benefits:
    name: Fetch Benefits Data
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch Benefits (Incremental Update)
        continue-on-error: true
        env:
          PUBLICDATA_SERVICE_KEY_ENC: ${{ secrets.PUBLICDATA_SERVICE_KEY_ENC }}
          PUBLICDATA_BASE_URL: ${{ secrets.PUBLICDATA_BASE_URL || 'https://api.odcloud.kr/api/gov24/v3' }}
          PUBLICDATA_DELAY_MS: ${{ secrets.PUBLICDATA_DELAY_MS || '600' }}
          PUBLICDATA_PAGE_SIZE: ${{ secrets.PUBLICDATA_PAGE_SIZE || '100' }}
          PUBLICDATA_TIMEOUT_MS: ${{ secrets.PUBLICDATA_TIMEOUT_MS || '60000' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: npm run fetch:benefits:incremental

      - name: Fetch Startup Data
        continue-on-error: true
        env:
          PUBLICDATA_SERVICE_KEY_ENC: ${{ secrets.PUBLICDATA_SERVICE_KEY_ENC }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          STARTUP_FETCH_MAX_PAGES: "5"
        run: |
          npm run db:init:turso
          npm run fetch:startup

      - name: Fetch Youth Policies
        env:
          YOUTHCENTER_API_KEY: ${{ secrets.YOUTHCENTER_API_KEY }}
          YOUTHCENTER_PAGE_SIZE: ${{ secrets.YOUTHCENTER_PAGE_SIZE || '100' }}
          YOUTHCENTER_MAX_PAGES: ${{ secrets.YOUTHCENTER_MAX_PAGES || '30' }}
          YOUTHCENTER_DELAY_MS: ${{ secrets.YOUTHCENTER_DELAY_MS || '400' }}
          YOUTHCENTER_FETCH_RETRIES: ${{ secrets.YOUTHCENTER_FETCH_RETRIES || '4' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: npm run fetch:youth

  generate-gemini:
    name: Generate Gemini Summaries
    runs-on: ubuntu-latest
    needs: fetch-benefits
    timeout-minutes: 30
    continue-on-error: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Gemini Content
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run gen:gemini

      - name: Ping IndexNow + submit sitemap to GSC
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          NEXT_PUBLIC_SITE_URL: https://www.bojo24.kr
          NOTIFY_DUE_POSTS_LOOKBACK_HOURS: "25"
        run: npm run content:notify-due || echo "Search engine ping failed (non-fatal)"

