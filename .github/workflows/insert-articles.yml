name: Insert Pre-written Articles

on:
  workflow_dispatch:

jobs:
  insert:
    name: Insert 10 Blog Articles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Insert articles into DB
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: npm run insert:articles

      - name: Ping IndexNow + submit sitemap to GSC
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          NEXT_PUBLIC_SITE_URL: https://www.bojo24.kr
          NOTIFY_DUE_POSTS_LOOKBACK_HOURS: "1"
        run: npm run content:notify-due || echo "Search engine ping failed (non-fatal)"
