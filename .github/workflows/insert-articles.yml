name: Insert Pre-written Articles

on:
  workflow_dispatch:
    inputs:
      batch:
        description: "실행할 배치 (1~7, all=전체)"
        required: false
        default: "all"

jobs:
  insert:
    name: Insert Blog Articles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Insert articles batch 1 (10개)
        if: ${{ github.event.inputs.batch == '1' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: npm run insert:articles

      - name: Insert articles batch 2 (기초연금·근로장려금 등 10개)
        if: ${{ github.event.inputs.batch == '2' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: npm run insert:articles2

      - name: Insert articles batch 3 (차상위·노인일자리 등 10개)
        if: ${{ github.event.inputs.batch == '3' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: npm run insert:articles3

      - name: Insert articles batch 4 (장애인활동지원·산재보험 등 10개)
        if: ${{ github.event.inputs.batch == '4' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SCHEDULE_BASE_TIME: ${{ vars.SCHEDULE_BASE_TIME_BATCH4 }}
        run: npm run insert:articles4

      - name: Insert articles batch 5 (출산휴가·교육급여 등 10개)
        if: ${{ github.event.inputs.batch == '5' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SCHEDULE_BASE_TIME: ${{ vars.SCHEDULE_BASE_TIME_BATCH5 }}
        run: npm run insert:articles5

      - name: Insert articles batch 6 (긴급복지·장기요양·주거급여 등 10개)
        if: ${{ github.event.inputs.batch == '6' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SCHEDULE_BASE_TIME: ${{ vars.SCHEDULE_BASE_TIME_BATCH6 }}
        run: npm run insert:articles6

      - name: Insert articles batch 7 (국민연금·암검진·보육 등 10개)
        if: ${{ github.event.inputs.batch == '7' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SCHEDULE_BASE_TIME: ${{ vars.SCHEDULE_BASE_TIME_BATCH7 }}
        run: npm run insert:articles7

      - name: Insert articles batch 8 (행복주택·청년월세·전세사기 등 10개)
        if: ${{ github.event.inputs.batch == '8' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SCHEDULE_BASE_TIME: ${{ vars.SCHEDULE_BASE_TIME_BATCH8 }}
        run: npm run insert:articles8

      - name: Insert articles batch 9 (에너지바우처·결핵·희귀질환·만성질환·법률 등 10개)
        if: ${{ github.event.inputs.batch == '9' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SCHEDULE_BASE_TIME: ${{ vars.SCHEDULE_BASE_TIME_BATCH9 }}
        run: npm run insert:articles9

      - name: Insert articles batch 11 (고용장려금·새일센터·내일배움카드·장년재취업 등 10개)
        if: ${{ github.event.inputs.batch == '11' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SCHEDULE_BASE_TIME: ${{ vars.SCHEDULE_BASE_TIME_BATCH11 }}
        run: npm run insert:articles11

      - name: Insert articles batch 12 (노인교통비·주거·급식·보청기·돌봄 등 10개)
        if: ${{ github.event.inputs.batch == '12' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SCHEDULE_BASE_TIME: ${{ vars.SCHEDULE_BASE_TIME_BATCH12 }}
        run: npm run insert:articles12

      - name: Insert articles batch 13 (장애인자동차세·통신요금·주간활동·청각시각 등 10개)
        if: ${{ github.event.inputs.batch == '13' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SCHEDULE_BASE_TIME: ${{ vars.SCHEDULE_BASE_TIME_BATCH13 }}
        run: npm run insert:articles13

      - name: Insert articles batch 14 (예방접종·급식카드·청소년심리상담·보호종료아동 등 10개)
        if: ${{ github.event.inputs.batch == '14' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SCHEDULE_BASE_TIME: ${{ vars.SCHEDULE_BASE_TIME_BATCH14 }}
        run: npm run insert:articles14

      - name: Insert articles batch 10 (공공임대·전세보증·보금자리론·신혼특공·확정일자 등 10개)
        if: ${{ github.event.inputs.batch == '10' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SCHEDULE_BASE_TIME: ${{ vars.SCHEDULE_BASE_TIME_BATCH10 }}
        run: npm run insert:articles10

      - name: Insert articles batch 15 (여성폭력지원·한부모주거·임산부바우처·양육비이행 등 10개)
        if: ${{ github.event.inputs.batch == '15' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SCHEDULE_BASE_TIME: ${{ vars.SCHEDULE_BASE_TIME_BATCH15 }}
        run: npm run insert:articles15

      - name: Insert articles batch 16 (건강보험피부양자·금연치료·정신건강·외국인건강 등 10개)
        if: ${{ github.event.inputs.batch == '16' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SCHEDULE_BASE_TIME: ${{ vars.SCHEDULE_BASE_TIME_BATCH16 }}
        run: npm run insert:articles16

      - name: Insert articles batch 17 (국가장학금·학자금대출·내일배움카드·귀농교육 등 10개)
        if: ${{ github.event.inputs.batch == '17' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SCHEDULE_BASE_TIME: ${{ vars.SCHEDULE_BASE_TIME_BATCH17 }}
        run: npm run insert:articles17

      - name: Insert articles batch 18 (소상공인확인서·노란우산공제·손실보상·재창업 등 10개)
        if: ${{ github.event.inputs.batch == '18' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SCHEDULE_BASE_TIME: ${{ vars.SCHEDULE_BASE_TIME_BATCH18 }}
        run: npm run insert:articles18

      - name: Insert articles batch 19 (근로소득세환급·햇살론·채무조정·임금체불 등 10개)
        if: ${{ github.event.inputs.batch == '19' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SCHEDULE_BASE_TIME: ${{ vars.SCHEDULE_BASE_TIME_BATCH19 }}
        run: npm run insert:articles19

      - name: Insert articles batch 20 (농업직불금·재해보험·농지연금·청년창업농 등 10개)
        if: ${{ github.event.inputs.batch == '20' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SCHEDULE_BASE_TIME: ${{ vars.SCHEDULE_BASE_TIME_BATCH20 }}
        run: npm run insert:articles20

      - name: Insert articles batch 21 (여행바우처·공공체육·박물관무료·도서관디지털 등 10개)
        if: ${{ github.event.inputs.batch == '21' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SCHEDULE_BASE_TIME: ${{ vars.SCHEDULE_BASE_TIME_BATCH21 }}
        run: npm run insert:articles21

      - name: Reschedule all art* posts at 5-hour intervals
        if: ${{ github.event.inputs.batch == 'all' || github.event.inputs.batch == '' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SCHEDULE_BASE_TIME: ${{ vars.SCHEDULE_BASE_TIME_BATCH2 }}
        run: npm run reschedule:articles

      - name: Ping IndexNow + submit sitemap to GSC
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          NEXT_PUBLIC_SITE_URL: https://www.bojo24.kr
          NOTIFY_DUE_POSTS_LOOKBACK_HOURS: "1"
        run: npm run content:notify-due || echo "Search engine ping failed (non-fatal)"
