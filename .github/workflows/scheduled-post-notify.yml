name: Scheduled Post IndexNow Notify

on:
  schedule:
    # 5시간마다 최근 공개된 예약 글을 Bing/Naver에 알림
    - cron: "17 */5 * * *"
  workflow_dispatch:

jobs:
  notify-due-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Notify due scheduled posts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          NEXT_PUBLIC_SITE_URL: https://www.bojo24.kr
        run: npm run content:notify-due
